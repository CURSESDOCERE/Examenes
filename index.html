<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Exámenes UNAM</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .menu {
            max-width: 600px;
            margin: auto;
        }

        .unidad {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
        }

        .subtemas {
            background-color: #ecf0f1;
            padding: 10px 20px;
            display: none;
            border-radius: 0 0 8px 8px;
        }

        .subtemas p {
            margin: 10px 0;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .subtemas p:hover {
            background-color: #dfe6e9;
        }
    </style>
</head>

<body>

    <h1>Exámenes UNAM</h1>

    <div class="menu">

        <!-- Unidad 1 -->
        <div class="unidad" onclick="toggleMenu('unidad1')">
            Unidad 1: Célula
        </div>

        <div id="unidad1" class="subtemas">
            <p>Teoría celular</p>
            <p>Estructura celular</p>
            <p>Examen Unidad 1</p>
        </div>

    </div>

    <script>
        function toggleMenu(id) {
            const elemento = document.getElementById(id);

            if (elemento.style.display === "block") {
                elemento.style.display = "none";
            } else {
                elemento.style.display = "block";
            }
        }
    </script>

</body>
</html>
