<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Exámenes UNAM</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .menu {
            max-width: 700px;
            margin: auto;
        }

        .unidad {
            background: #2c3e50;
            color: white;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 18px;
        }

        .subtemas {
            background: #ecf0f1;
            display: none;
            padding: 10px 20px;
            border-radius: 0 0 8px 8px;
        }

        .subtemas p {
            background: white;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin: 8px 0;
            transition: 0.2s;
        }

        .subtemas p:hover {
            background: #dfe6e9;
            transform: scale(1.02);
        }
    </style>
</head>

<body>

<h1>Plataforma de Exámenes UNAM</h1>

<div class="menu">

    <!-- UNIDAD 1 -->
    <div class="unidad" onclick="toggleMenu('u1')">
        Unidad 1: Célula
    </div>

    <div id="u1" class="subtemas">
        <p onclick="irA('unidad1/teoria.html')">Teoría celular</p>
        <p>Estructura celular</p>
        <p>Examen Unidad 1</p>
    </div>

</div>

<script>
function toggleMenu(id) {
    const elemento = document.getElementById(id);
    elemento.style.display = elemento.style.display === "block" ? "none" : "block";
}

function irA(ruta) {
    window.location.href = ruta;
}
</script>

</body>
</html>
