<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Fotosíntesis</title>

<style>
body { font-family: Arial; padding: 20px; }
.correcta { background: #c8f7c5; }
.incorrecta { background: #f7c5c5; }
</style>

</head>
<body>

<a href="../index.html">⬅ Volver al menú</a>

<h2>Fotosíntesis</h2>

<label>Nombre:</label>
<input type="text" id="nombre"><br><br>

<p id="fecha"></p>

<div id="quiz"></div>

<button onclick="calcular()">Enviar</button>

<div id="resultado"></div>

<script>
// fecha automática
document.getElementById("fecha").innerText =
"Fecha: " + new Date().toLocaleDateString();

// preguntas
const preguntas = [
"¿Dónde ocurre la fotosíntesis?"
];

const opciones = [
["Mitocondria","Núcleo","Cloroplasto","Ribosoma"]
];

const correctas = [2];

// cargar preguntas
let html = "";
for (let i = 0; i < preguntas.length; i++) {
    html += `<div id="p${i}"><p>${preguntas[i]}</p>`;

    for (let j = 0; j < 4; j++) {
        html += `
        <label>
        <input type="radio" name="q${i}" value="${j}">
        ${opciones[i][j]}
        </label><br>`;
    }

    html += "</div>";
}
document.getElementById("quiz").innerHTML = html;

// evaluar
function calcular() {
    let total = 0;

    for (let i = 0; i < correctas.length; i++) {
        let radios = document.getElementsByName("q" + i);
        let contenedor = document.getElementById("p" + i);

        for (let r of radios) {
            if (r.checked) {
                if (parseInt(r.value) === correctas[i]) {
                    total++;
                    contenedor.classList.add("correcta");
                } else {
                    contenedor.classList.add("incorrecta");
                }
            }
        }
    }

    document.getElementById("resultado").innerHTML =
    "Resultado: " + total + "/" + correctas.length;
}
</script>

</body>
</html>
